# Configuration Supabase locale — Alpha Center / alphaTrack
# Ce fichier est versionné. Il décrit la stack démarrée par `supabase start`.

project_id = "alphatrack"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.bulletins]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["application/pdf"]
objects_path = "./supabase/buckets/bulletins"

[storage.buckets.classements]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf"]
objects_path = "./supabase/buckets/classements"

[storage.buckets.photos-eleves]
public = false
file_size_limit = "2MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]
objects_path = "./supabase/buckets/photos-eleves"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5174"]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
